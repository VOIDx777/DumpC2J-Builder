name: DumpC2J Kernel Builder

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Custom Kernel Name (LOCALVERSION)"
        required: true
        type: string
        default: "-anykern3-11-DumpC2J"
      spoof_uname:
        description: "Spoof Uname (SUSFS/Stock Naming)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
      clang_variant:
        description: "Clang Toolchain"
        required: true
        type: choice
        options:
          - neutron
          - cirrus
          - weebx
          - zyc
        default: neutron
      hz:
        description: "Refresh Rate (HZ)"
        required: true
        type: choice
        options:
          - powersave
          - balance
          - smooth
          - performance
          - ultra-performance
        default: smooth
      variant:
        description: "Build Variant"
        required: true
        type: choice
        options:
          - stock
          - root
          - susfs
        default: stock
      root:
        description: "Root Method"
        required: true
        type: choice
        options:
          - none
          - ksu-next
          - kowsu
          - sukisu
          - resukisu
        default: sukisu
      lto:
        description: "LTO Mode"
        required: true
        type: choice
        options:
          - full
          - thin
          - none
        default: full
      bypasscharging:
        description: "Bypass Charging (MCA Override)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      droidspaces:
        description: "Droidspaces Support"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
      kernel_version_spoof:
        description: "Spoof Kernel Version (kosongkan = pakai upstream)"
        required: false
        type: string
        default: ""
      debug:
        description: "Debug Mode (nokaslr, no optimizations)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
      run_mode:
        description: "Build Run Mode"
        required: true
        type: choice
        options:
          - normal
          - droidspaces
        default: normal
      zeromount:
        description: "ZeroMount VFS Redirection"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTUAL_ROOT: ${{ inputs.root }}
      BUILD_NAME: ${{ inputs.variant }}-${{ inputs.root }}-${{ inputs.hz }}-${{ inputs.bypasscharging }}-${{ inputs.droidspaces }}-${{ inputs.zeromount }}
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          repository: VOIDx777/DumpC2J-Builder
          path: builder

      - name: Setup Clang
        env:
          CLANG_VARIANT: ${{ inputs.clang_variant }}
          CLANG_PATH: /home/runner/toolchains/${{ inputs.clang_variant }}-clang/bin
          KBUILD_COMPILER_STRING: ${{ inputs.clang_variant }} Clang
        run: bash builder/scripts/setup_clang.sh ${{ inputs.clang_variant }}

      - name: Setup AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          # Note: Custom anykernel.sh not included in kernel-source

      - name: Scout Checkpoint
        env:
          ROOT: ${{ env.ACTUAL_ROOT }}
          VARIANT: ${{ inputs.variant }}
          RUN_MODE: ${{ inputs.run_mode }}
        run: bash builder/scripts/scout.sh

      - name: Setup ccache
        env:
          ACTUAL_ROOT: ${{ env.ACTUAL_ROOT }}
          CLANG_VARIANT: ${{ inputs.clang_variant }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash builder/scripts/lib/ccache_setup.sh

      - name: Build Kernel
        env:
          INPUT_HZ: ${{ inputs.hz }}
          INPUT_VARIANT: ${{ inputs.variant }}
          INPUT_ROOT: ${{ inputs.root }}
          INPUT_LTO: ${{ inputs.lto }}
          INPUT_HARDENED: "off"
          INPUT_HTSR: "on"
          INPUT_WIFI: "on"
          INPUT_KGSL: "on"
          INPUT_DATA: "on"
          INPUT_BYPASS: ${{ inputs.bypasscharging }}
          INPUT_DROIDSPACES: ${{ inputs.droidspaces }}
          INPUT_DEBUG: ${{ inputs.debug }}
          INPUT_KERNEL_NAME: ${{ inputs.kernel_name }}
          INPUT_SPOOF_UNAME: ${{ inputs.spoof_uname }}
          INPUT_VERSION_SPOOF: ${{ inputs.kernel_version_spoof }}
          INPUT_ZEROMOUNT: ${{ inputs.zeromount }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash builder/scripts/build.sh

      - name: Save ccache
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash builder/scripts/lib/ccache_save.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: DumpC2J-${{ env.BUILD_NAME }}
          path: kernel-source/DumpC2J-Release
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f \( -name "*.zip" -o -name "*.img" \) -exec mv {} release_assets/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dumpc2j-build-${{ github.run_number }}
          name: DumpC2J Build #${{ github.run_number }}
          body: |
            ### Build Configuration
            - **Variant:** ${{ inputs.variant }}
            - **Root:** ${{ inputs.root }}
            - **HZ:** ${{ inputs.hz }}
            - **LTO:** ${{ inputs.lto }}
            - **Clang:** ${{ inputs.clang_variant }}
            - **ZeroMount:** ${{ inputs.zeromount }}
          files: release_assets/*
