name: DumpC2J Daily Focused Build

on:
  schedule:
    # Runs at 18:30 UTC daily (12:00 AM IST)
    - cron: '30 18 * * *'
  workflow_dispatch: # Allows manual trigger of this exact build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check_upstream:
    name: "Check Upstream Updates"
    runs-on: ubuntu-latest
    outputs:
      update_found: ${{ steps.check.outputs.has_update }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Upstream Checker
        id: check
        # Telegram env vars have been removed here
        run: |
          # Run the existing upstream check script and capture the output
          output=$(bash scripts/upstream_check.sh)
          echo "$output"
          
          # The script outputs "Notified: X update(s)." when it finds something new
          if echo "$output" | grep -q "Notified:"; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_update=false" >> "$GITHUB_OUTPUT"
          fi

  test_build:
    name: "Test Build (KSU-Next / Smooth / SUSFS / Neutron)"
    needs: check_upstream
    # Only run the test build if upstream updates were actually found
    if: needs.check_upstream.outputs.update_found == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          path: builder
          fetch-depth: 0

      - name: Clone Kernel Source
        run: |
          git clone --depth=50 \
            --branch main \
            https://${{ secrets.GH_TOKEN }}@github.com/adennnqt/DumpC2J-Kernel \
            kernel-source

      - name: Setup Hardcoded Environment Variables
        run: |
          echo "HZ_ID=300" >> $GITHUB_ENV
          echo "ACTUAL_ROOT=ksu-next" >> $GITHUB_ENV
          echo "BUILD_NAME=susfs-ksu-next-smooth-bypasscharging-nomount" >> $GITHUB_ENV

      - name: Create Swap
        run: |
          SWAPFILE="/mnt/build_swapfile"
          while true; do
            if sudo fallocate -l 10G $SWAPFILE || sudo dd if=/dev/zero of=$SWAPFILE bs=1M count=10240 status=progress; then
              break
            else
              sleep 5
            fi
          done
          sudo chmod 600 $SWAPFILE && sudo mkswap $SWAPFILE && sudo swapon $SWAPFILE

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf imagemagick \
            lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 clang lld llvm jq

      - name: Setup Clang (Neutron)
        run: |
          bash builder/scripts/setup_clang.sh neutron

      - name: Setup AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          cp kernel-source/anykernel/anykernel.sh anykernel/anykernel.sh
          cp -r kernel-source/anykernel/tools/* anykernel/tools/

      - name: Scout Checkpoint
        env:
          ROOT: "ksu-next"
          VARIANT: "susfs"
          RUN_MODE: "Test"
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # Added GH_TOKEN to fix the manifest update error
        run: bash builder/scripts/scout.sh

      - name: Setup ccache
        env:
          ACTUAL_ROOT: "ksu-next"
          CLANG_VARIANT: "neutron"
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash builder/scripts/lib/ccache_setup.sh

      - name: Build Kernel
        env:
          INPUT_HZ: "smooth"
          INPUT_VARIANT: "susfs"
          INPUT_ROOT: "ksu-next"
          INPUT_LTO: "full"
          INPUT_HARDENED: "off"
          INPUT_HTSR: "on"
          INPUT_WIFI: "on"
          INPUT_KGSL: "on"
          INPUT_DATA: "on"
          INPUT_BYPASS: "on"
          INPUT_DROIDSPACES: "off"
          INPUT_DEBUG: "off"
          INPUT_KERNEL_NAME: "-anykern3-11-DumpC2J"
          INPUT_SPOOF_UNAME: "on"
          INPUT_VERSION_SPOOF: ""
          INPUT_NOMOUNT: "on"
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          bash builder/scripts/build.sh

      - name: Save ccache
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash builder/scripts/lib/ccache_save.sh

  release_build:
    name: "Release Build (KSU-Next / Smooth / SUSFS / Neutron)"
    needs: test_build # Implicitly waits for test_build to SUCCEED
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          path: builder
          fetch-depth: 0

      - name: Clone Kernel Source
        run: |
          git clone --depth=50 \
            --branch main \
            https://${{ secrets.GH_TOKEN }}@github.com/adennnqt/DumpC2J-Kernel \
            kernel-source

      - name: Setup Hardcoded Environment Variables
        run: |
          echo "HZ_ID=300" >> $GITHUB_ENV
          echo "ACTUAL_ROOT=ksu-next" >> $GITHUB_ENV
          echo "BUILD_NAME=susfs-ksu-next-smooth-bypasscharging-nomount" >> $GITHUB_ENV

      - name: Create Swap
        run: |
          SWAPFILE="/mnt/build_swapfile"
          while true; do
            if sudo fallocate -l 10G $SWAPFILE || sudo dd if=/dev/zero of=$SWAPFILE bs=1M count=10240 status=progress; then
              break
            else
              sleep 5
            fi
          done
          sudo chmod 600 $SWAPFILE && sudo mkswap $SWAPFILE && sudo swapon $SWAPFILE

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf imagemagick \
            lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 clang lld llvm jq

      - name: Setup Clang (Neutron)
        run: |
          bash builder/scripts/setup_clang.sh neutron

      - name: Setup AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          cp kernel-source/anykernel/anykernel.sh anykernel/anykernel.sh
          cp -r kernel-source/anykernel/tools/* anykernel/tools/

      - name: Scout Checkpoint
        env:
          ROOT: "ksu-next"
          VARIANT: "susfs"
          RUN_MODE: "Release"
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # Added GH_TOKEN to fix the manifest update error
        run: bash builder/scripts/scout.sh

      - name: Setup ccache
        env:
          ACTUAL_ROOT: "ksu-next"
          CLANG_VARIANT: "neutron"
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash builder/scripts/lib/ccache_setup.sh

      - name: Build Kernel
        env:
          INPUT_HZ: "smooth"
          INPUT_VARIANT: "susfs"
          INPUT_ROOT: "ksu-next"
          INPUT_LTO: "full"
          INPUT_HARDENED: "off"
          INPUT_HTSR: "on"
          INPUT_WIFI: "on"
          INPUT_KGSL: "on"
          INPUT_DATA: "on"
          INPUT_BYPASS: "on"
          INPUT_DROIDSPACES: "off"
          INPUT_DEBUG: "off"
          INPUT_KERNEL_NAME: "-anykern3-11-DumpC2J"
          INPUT_SPOOF_UNAME: "on"
          INPUT_VERSION_SPOOF: ""
          INPUT_NOMOUNT: "on"
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          bash builder/scripts/build.sh

      - name: Save ccache
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash builder/scripts/lib/ccache_save.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DumpC2J-${{ env.BUILD_NAME }}
          path: kernel-source/DumpC2J-Release
          retention-days: 7

  release:
    needs: release_build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \; || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dumpc2j-daily-${{ github.run_number }}
          name: Daily Auto Build - ${{ github.sha }}
          body: |
            ### 🛠️ Build Configuration
            - **Variant:** SUSFS (KSU-Next)
            - **Refresh Rate:** Smooth (300 HZ)
            - **Clang Toolchain:** Neutron
            - **Mods Enabled:** Bypass Charging, NoMount, Spoof Uname
            
            > [!CAUTION]
            > **BACKUP your boot.img** before flashing to recover from potential bootloops or other issues.
            
            **Commit Details:** ${{ github.sha }}
          files: release_assets/*
