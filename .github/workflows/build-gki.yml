name: DumpC2J GKI Kernel Builder

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel Version"
        required: true
        type: choice
        options:
          - "6.12"
        default: "6.12"
      kernel_branch:
        description: "AOSP Kernel Branch"
        required: true
        type: string
        default: "android16-6.12-2025-06"
      kernel_name:
        description: "Custom Kernel Name (LOCALVERSION)"
        required: true
        type: string
        default: "-DumpC2J-GKI"
      clang_variant:
        description: "Clang Toolchain"
        required: true
        type: choice
        options:
          - neutron
          - cirrus
          - weebx
          - zyc
        default: neutron
      hz:
        description: "Timer Frequency (HZ)"
        required: true
        type: choice
        options:
          - powersave
          - balance
          - smooth
          - performance
          - ultra-performance
        default: balance
      variant:
        description: "Build Variant"
        required: true
        type: choice
        options:
          - stock
          - root
          - susfs
        default: susfs
      root:
        description: "Root Method"
        required: true
        type: choice
        options:
          - none
          - ksu
          - ksu-next
          - sukisu
          - resukisu
        default: sukisu

jobs:
  build:
    name: Custom Build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 \
            https://github.com/aosp-mirror/kernel_common.git \
            -b ${{ github.event.inputs.kernel_branch }} \
            kernel-source
          echo "Kernel version: $(head -5 kernel-source/Makefile | grep -E 'VERSION|PATCHLEVEL|SUBLEVEL' | awk '{print $3}' | tr '\n' '.' | sed 's/\.$//')"

      - name: Parse Inputs
        run: |
          echo "INPUT_KERNEL_VERSION=${{ github.event.inputs.kernel_version }}" >> $GITHUB_ENV
          echo "INPUT_KERNEL_BRANCH=${{ github.event.inputs.kernel_branch }}" >> $GITHUB_ENV
          echo "INPUT_KERNEL_NAME=${{ github.event.inputs.kernel_name }}" >> $GITHUB_ENV
          echo "INPUT_HZ=${{ github.event.inputs.hz }}" >> $GITHUB_ENV
          echo "INPUT_VARIANT=${{ github.event.inputs.variant }}" >> $GITHUB_ENV
          echo "INPUT_ROOT=${{ github.event.inputs.root }}" >> $GITHUB_ENV
          echo "CLANG_VARIANT=${{ github.event.inputs.clang_variant }}" >> $GITHUB_ENV

      - name: Create Swap
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Setup Build Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates flex git \
            libelf-dev libssl-dev lld llvm python3 zip

      - name: Setup Clang
        run: bash builder/scripts/setup_clang.sh

      - name: Setup AnyKernel3
        run: |
          git clone --depth=1 \
            https://github.com/Coconutat/AnyKernel3.git \
            anykernel

      - name: Build Kernel
        run: bash builder/scripts/build-gki.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DumpC2J-GKI-${{ github.event.inputs.kernel_version }}-${{ github.event.inputs.variant }}-${{ github.event.inputs.root }}
          path: "*.zip"
          retention-days: 7

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-gki${{ github.event.inputs.kernel_version }}
          name: "DumpC2J GKI ${{ github.event.inputs.kernel_version }}"
          files: "*.zip"
          body: |
            **DumpC2J GKI Kernel — Automated Build**

            Kernel Version: ${{ github.event.inputs.kernel_version }}
            Branch: ${{ github.event.inputs.kernel_branch }}
            Variant: ${{ github.event.inputs.variant }}
            Root: ${{ github.event.inputs.root }}
            HZ: ${{ github.event.inputs.hz }}
            Clang: ${{ github.event.inputs.clang_variant }}

            Commit: ${{ github.sha }}
