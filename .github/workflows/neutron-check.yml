name: Neutron Clang Update Checker

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Neutron Clang Version
        run: |
          LATEST=$(curl -s https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['tag_name'])")
          echo "Latest Neutron: $LATEST"
          echo "NEUTRON_VERSION=$LATEST" >> $GITHUB_ENV

      - name: Check cached version
        id: cache
        uses: actions/cache@v4
        with:
          path: .neutron_version
          key: neutron-version-${{ env.NEUTRON_VERSION }}

      - name: Save version file
        if: steps.cache.outputs.cache-hit != 'true'
        run: echo "${{ env.NEUTRON_VERSION }}" > .neutron_version

      - name: Notify Telegram if new version
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEUTRON_VER: ${{ env.NEUTRON_VERSION }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=Neutron Clang Update tersedia! Version: ${NEUTRON_VER} - Waktunya rebuild kernel DumpC2J"
