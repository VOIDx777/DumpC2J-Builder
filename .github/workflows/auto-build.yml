name: DumpC2J Daily Auto Builder

on:
  schedule:
    # 18:30 UTC is exactly 12:00 AM IST the next day
    - cron: '30 18 * * *'
  workflow_dispatch: # Allows you to manually trigger the matrix run anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.variant }} / ${{ matrix.root }} / ${{ matrix.hz }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        hz: [powersave, balance, smooth, performance, ultra-performance]
        root: [none, ksu-next, kowsu, sukisu] # ResukiSU is excluded
        variant: [stock, susfs, root]
        exclude:
          # Root variants must have a root manager
          - variant: root
            root: none
          # SUSFS variants must have a root manager (removes susfs + no root)
          - variant: susfs
            root: none
          # Stock variant cannot have a root manager (only root: none is valid)
          - variant: stock
            root: ksu-next
          - variant: stock
            root: kowsu
          - variant: stock
            root: sukisu

    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          path: builder
          fetch-depth: 0

      - name: Clone Kernel Source
        run: |
          git clone --depth=50 \
            --branch main \
            https://${{ secrets.GH_TOKEN }}@github.com/adennnqt/DumpC2J-Kernel \
            kernel-source

      - name: Parse Inputs
        id: setup_vars
        env:
          INPUT_HZ: ${{ matrix.hz }}
          INPUT_VARIANT: ${{ matrix.variant }}
          INPUT_ROOT: ${{ matrix.root }}
        run: |
          # Set HZ ID
          if [ "$INPUT_HZ" == "powersave" ]; then HZ_ID=100
          elif [ "$INPUT_HZ" == "balance" ]; then HZ_ID=250
          elif [ "$INPUT_HZ" == "performance" ]; then HZ_ID=500
          elif [ "$INPUT_HZ" == "smooth" ]; then HZ_ID=300
          elif [ "$INPUT_HZ" == "ultra-performance" ]; then HZ_ID=1000
          fi
          echo "HZ_ID=$HZ_ID" >> $GITHUB_ENV

          # Configure zeromount and bypasscharging logic
          if [ "$INPUT_VARIANT" == "stock" ]; then
            INPUT_ZEROMOUNT="off"
          else
            # Default for Root & SUSFS builds
            INPUT_ZEROMOUNT="on"
          fi
          
          # Bypass Charging is ON for all builds
          INPUT_BYPASS="on"
          
          echo "INPUT_ZEROMOUNT=$INPUT_ZEROMOUNT" >> $GITHUB_ENV
          echo "INPUT_BYPASS=$INPUT_BYPASS" >> $GITHUB_ENV

          # Set Build Name
          if [ "$INPUT_ROOT" == "none" ]; then
            BUILD_NAME="${INPUT_VARIANT}-${INPUT_HZ}"
          else
            BUILD_NAME="${INPUT_VARIANT}-${INPUT_ROOT}-${INPUT_HZ}"
          fi

          [ "$INPUT_ZEROMOUNT" == "on" ] && BUILD_NAME="${BUILD_NAME}-zeromount"
          [ "$INPUT_BYPASS" == "on" ] && BUILD_NAME="${BUILD_NAME}-bypasscharging"

          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV

      - name: Create Swap
        run: |
          SWAPFILE="/mnt/build_swapfile"
          while true; do
            if sudo fallocate -l 10G $SWAPFILE || sudo dd if=/dev/zero of=$SWAPFILE bs=1M count=10240 status=progress; then
              break
            else
              sleep 5
            fi
          done
          sudo chmod 600 $SWAPFILE && sudo mkswap $SWAPFILE && sudo swapon $SWAPFILE

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf imagemagick \
            lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush \
            rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 clang lld llvm jq

      - name: Setup Clang
        run: |
          bash builder/scripts/setup_clang.sh neutron

      - name: Setup AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          cp kernel-source/anykernel/anykernel.sh anykernel/anykernel.sh
          cp -r kernel-source/anykernel/tools/* anykernel/tools/

      - name: Scout Checkpoint
        env:
          ROOT: ${{ matrix.root }}
          VARIANT: ${{ matrix.variant }}
          RUN_MODE: Release
        run: bash builder/scripts/scout.sh

      - name: Setup ccache
        env:
          ACTUAL_ROOT: ${{ matrix.root }}
          CLANG_VARIANT: neutron
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash builder/scripts/lib/ccache_setup.sh

      - name: Build Kernel
        env:
          INPUT_HZ: ${{ matrix.hz }}
          INPUT_VARIANT: ${{ matrix.variant }}
          INPUT_ROOT: ${{ matrix.root }}
          INPUT_LTO: full
          INPUT_HARDENED: "off"
          INPUT_HTSR: "on"
          INPUT_WIFI: "on"
          INPUT_KGSL: "on"
          INPUT_DATA: "on"
          INPUT_BYPASS: ${{ env.INPUT_BYPASS }}
          INPUT_DROIDSPACES: "off"
          INPUT_DEBUG: "off"
          INPUT_KERNEL_NAME: "-anykern3-11-DumpC2J"
          INPUT_SPOOF_UNAME: "off"
          INPUT_VERSION_SPOOF: ""
          INPUT_ZEROMOUNT: ${{ env.INPUT_ZEROMOUNT }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          bash builder/scripts/build.sh

      - name: Save ccache
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash builder/scripts/lib/ccache_save.sh

      - name: Rename ZIP to Prevent Collision
        if: success()
        run: |
          cd kernel-source/DumpC2J-Release || exit 0
          for file in *.zip; do
            if [ -f "$file" ]; then
              mv "$file" "DumpC2J-${{ env.BUILD_NAME }}.zip"
            fi
          done

      - name: Record Job Success
        if: success()
        run: echo "success" > status-${{ matrix.variant }}-${{ matrix.root }}-${{ matrix.hz }}.txt

      - name: Record Job Failure
        if: failure()
        run: echo "failed" > status-${{ matrix.variant }}-${{ matrix.root }}-${{ matrix.hz }}.txt

      - name: Upload Status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-${{ matrix.variant }}-${{ matrix.root }}-${{ matrix.hz }}
          path: status-*.txt
          retention-days: 1

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DumpC2J-${{ env.BUILD_NAME }}
          path: kernel-source/DumpC2J-Release/*.zip
          retention-days: 7

  release:
    needs: build
    if: always() # Ensure release goes live even if some individual variants fail
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \; || true

      - name: Generate Markdown Table
        run: |
          cat << 'EOF' > gen_table.sh
          #!/bin/bash
          REPO="${{ github.repository }}"
          TAG="dumpc2j-daily-${{ github.run_number }}"

          echo "### Automated Kernel Build" > release_body.md
          echo "Commit: ${{ github.sha }}" >> release_body.md
          echo "" >> release_body.md
          echo "> [!CAUTION]" >> release_body.md
          echo "> **BACKUP your boot.img** before flashing to recover from potential bootloops or other issues." >> release_body.md
          echo "> **Note:** Bypass charging is ON for all builds. Zeromount is ON for all builds except stock." >> release_body.md
          echo "" >> release_body.md

          HZs=("powersave" "balance" "smooth" "performance" "ultra-performance")

          # Table 1: Standard / Root Builds
          echo "### Standard / Root Builds" >> release_body.md
          echo "| Variant | Powersave | Balance | Smooth | Performance | Ultra-Performance |" >> release_body.md
          echo "|---|---|---|---|---|---|" >> release_body.md

          for ROOT in "none" "ksu-next" "kowsu" "sukisu"; do
            if [ "$ROOT" == "none" ]; then
              VARIANT_LOWER="stock"
              DISPLAY_ROOT="Stock"
            else
              VARIANT_LOWER="root"
              [ "$ROOT" == "ksu-next" ] && DISPLAY_ROOT="KernelSU Next"
              [ "$ROOT" == "kowsu" ] && DISPLAY_ROOT="KowSU"
              [ "$ROOT" == "sukisu" ] && DISPLAY_ROOT="SukiSU"
            fi
            
            ROW="| **$DISPLAY_ROOT** |"
            for HZ in "${HZs[@]}"; do
              STATUS_FILE="artifacts/status-${VARIANT_LOWER}-${ROOT}-${HZ}.txt"
              
              if grep -q "success" "$STATUS_FILE" 2>/dev/null; then
                FILE_PREFIX="${VARIANT_LOWER}"
                [ "$ROOT" != "none" ] && FILE_PREFIX="${FILE_PREFIX}-${ROOT}"
                FILE_PREFIX="${FILE_PREFIX}-${HZ}"
                
                # Dynamic suffix mapping
                if [ "$VARIANT_LOWER" == "stock" ]; then
                  FILE_PREFIX="${FILE_PREFIX}-bypasscharging"
                else
                  FILE_PREFIX="${FILE_PREFIX}-zeromount-bypasscharging"
                fi
                
                ZIP_FILE=$(find release_assets -type f -name "*${FILE_PREFIX}*.zip" -printf "%f\n" | head -n 1)
                
                if [ -n "$ZIP_FILE" ]; then
                  DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${ZIP_FILE}"
                  LINK_TEXT="${ZIP_FILE%.zip}"
                  LINK_TEXT="${LINK_TEXT#DumpC2J-}"
                  ROW="$ROW [${LINK_TEXT}](${DOWNLOAD_URL}) |"
                else
                  ROW="$ROW ✅ Passed |"
                fi
              else
                ROW="$ROW ❌ Failed |"
              fi
            done
            echo "$ROW" >> release_body.md
          done
          echo "" >> release_body.md

          # Table 2: SUSFS
          echo "### SUSFS 💦" >> release_body.md
          echo "| Variant | Powersave | Balance | Smooth | Performance | Ultra-Performance |" >> release_body.md
          echo "|---|---|---|---|---|---|" >> release_body.md

          for ROOT in "ksu-next" "kowsu" "sukisu"; do
            VARIANT_LOWER="susfs"
            [ "$ROOT" == "ksu-next" ] && DISPLAY_ROOT="KernelSU Next"
            [ "$ROOT" == "kowsu" ] && DISPLAY_ROOT="KowSU"
            [ "$ROOT" == "sukisu" ] && DISPLAY_ROOT="SukiSU"
            
            ROW="| **$DISPLAY_ROOT** |"
            for HZ in "${HZs[@]}"; do
              STATUS_FILE="artifacts/status-${VARIANT_LOWER}-${ROOT}-${HZ}.txt"
              
              if grep -q "success" "$STATUS_FILE" 2>/dev/null; then
                FILE_PREFIX="${VARIANT_LOWER}-${ROOT}-${HZ}-zeromount-bypasscharging"
                
                ZIP_FILE=$(find release_assets -type f -name "*${FILE_PREFIX}*.zip" -printf "%f\n" | head -n 1)
                
                if [ -n "$ZIP_FILE" ]; then
                  DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${ZIP_FILE}"
                  LINK_TEXT="${ZIP_FILE%.zip}"
                  LINK_TEXT="${LINK_TEXT#DumpC2J-}"
                  ROW="$ROW [${LINK_TEXT}](${DOWNLOAD_URL}) |"
                else
                  ROW="$ROW ✅ Passed |"
                fi
              else
                ROW="$ROW ❌ Failed |"
              fi
            done
            echo "$ROW" >> release_body.md
          done
          EOF
          bash gen_table.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dumpc2j-daily-${{ github.run_number }}
          name: Daily DumpC2J Build - ${{ github.sha }}
          body_path: release_body.md
          files: release_assets/*
